version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kVAssetTracker-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/kVAssetTracker
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL}
    depends_on:
      - mongodb
      - redis
      - minio
    volumes:
      - ./uploads:/app/uploads
    networks:
      - kVAssetTracker-network
    restart: unless-stopped

  # MongoDB
  mongodb:
    image: mongo:6.0
    container_name: kVAssetTracker-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=kVAssetTracker
    volumes:
      - mongodb-data:/data/db
      - ./scripts/mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - kVAssetTracker-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: kVAssetTracker-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - kVAssetTracker-network
    restart: unless-stopped

  # MinIO (File Storage)
  minio:
    image: minio/minio:latest
    container_name: kVAssetTracker-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - kVAssetTracker-network
    restart: unless-stopped

  # MinIO Client (Initialize buckets)
  minio-init:
    image: minio/mc:latest
    container_name: kVAssetTracker-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb local/kVAssetTracker-photos;
      mc mb local/kVAssetTracker-reports;
      mc policy set download local/kVAssetTracker-photos;
      echo 'MinIO buckets initialized';
      "
    networks:
      - kVAssetTracker-network

volumes:
  mongodb-data:
  redis-data:
  minio-data:

networks:
  kVAssetTracker-network:
    driver: bridge