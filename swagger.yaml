components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: MongoDB ObjectId

  schemas:
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            accessToken:
              type: string

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [Super Admin, Territory Manager, Engineer, Field Technician, Viewer]
        territory_id:
          type: string
        is_active:
          type: boolean
        is_email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    TransformerCreate:
      type: object
      required: [manufacturer, kva_rating, network_voltage_kv, territory_id, district_id, site_name, latitude, longitude]
      properties:
        manufacturer:
          type: string
        serial_number:
          type: string
        kva_rating:
          type: integer
          enum: [50, 100, 160, 200, 250, 315, 500, 630, 1000]
        network_voltage_kv:
          type: integer
          enum: [11, 33]
        voltage_secondary:
          type: string
          enum: ['415V', '240V', Other]
        phase_type:
          type: string
          enum: ['Single Phase', 'Three Phase']
        cooling_type:
          type: string
          enum: [ONAN, ONAF, OFAF]
        mounting_type:
          type: string
          enum: ['Pole Mounted', Plinth, Ground, 'Indoor Substation']
        territory_id:
          type: string
        service_area_id:
          type: string
        feeder_name:
          type: string
        district_id:
          type: string
        site_name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        install_date:
          type: string
          format: date
        installing_contractor:
          type: string

    TransformerUpdate:
      type: object
      properties:
        manufacturer:
          type: string
        operational_status:
          type: string
          enum: [Active, Faulty, 'Under Maintenance', Decommissioned]
        site_name:
          type: string
        service_area_id:
          type: string
        feeder_name:
          type: string

    InspectionCreate:
      type: object
      required: [transformer_id]
      properties:
        transformer_id:
          type: string
        inspection_date:
          type: string
          format: date
        overall_condition:
          type: string
          enum: [Good, Fair, Poor, Critical]
        physical:
          type: object
        electrical:
          type: object
        oil:
          type: object
        recommendations:
          type: string

    FaultCreate:
      type: object
      required: [transformer_id, fault_type, severity, fault_description]
      properties:
        transformer_id:
          type: string
        fault_date:
          type: string
          format: date
        fault_type:
          type: string
          enum: [Overload, 'Oil Leak', 'Bushing Failure', 'Winding Failure', 'Complete Failure', Fire, Theft, Vandalism, 'LV Side Fault', 'HV Side Fault', Other]
        severity:
          type: string
          enum: [Minor, Major, Critical, 'Complete Outage']
        fault_description:
          type: string
          minLength: 10
        fault_source:
          type: string
          enum: ['Field Observation', 'Customer Report', Supervisor]
        customers_affected:
          type: integer
          minimum: 0

  responses:
    PaginatedResponse:
      description: Paginated list
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
              data:
                type: array
                items:
                  type: object
              pagination:
                type: object
                properties:
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
                  pages:
                    type: integer

    ItemResponse:
      description: Single item or list without pagination
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
              data:
                type: object

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Validation failed
              errors:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    message:
                      type: string

    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: No token provided

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Resource not found

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
