openapi: 3.0.0
info:
  title: kVAssetTracker API
  version: 1.0.0
  description: Transformer Asset Management Platform — MVP API Contract

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://api.kVAssetTracker.com/api
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: Transformers
    description: Transformer asset management
  - name: Inspections
    description: Field inspections
  - name: Faults
    description: Fault reporting and lifecycle
  - name: Maintenance
    description: Maintenance records
  - name: Territories
    description: Territory reference data
  - name: ServiceAreas
    description: Service area reference data
  - name: Feeders
    description: Feeder reference data
  - name: Districts
    description: District reference data (read-only)
  - name: Ratings
    description: Transformer rating reference data

paths:

  # ─── AUTH ────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confirmPassword]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
                role:
                  type: string
                  enum: [Super Admin, Territory Manager, Engineer, Field Technician, Viewer]
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      message:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful — refreshToken set as HTTP-only cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Browser clients should send the HTTP-only `refreshToken` cookie set at login. Non-browser clients may send `refreshToken` in the JSON request body. If both are missing, the API returns 401.
      security: []
      parameters:
        - name: refreshToken
          in: cookie
          required: false
          schema:
            type: string
          description: HTTP-only refresh token cookie set by login.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Optional body token for non-browser API clients.
      responses:
        '200':
          description: New access token issued; refresh cookie is maintained or rotated as an HTTP-only cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout from all devices
      responses:
        '200':
          description: All sessions revoked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                preferences:
                  type: object
                push_tokens:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Profile updated
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returns success (email existence not revealed)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token from email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirmPassword]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email using token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verified

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend email verification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification email sent

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword, confirmPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions
      responses:
        '200':
          description: Active sessions

  /auth/sessions/{sessionToken}:
    delete:
      tags: [Auth]
      summary: Revoke a specific session
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session revoked

  # ─── TRANSFORMERS ─────────────────────────────────────────────────────────────

  /transformers:
    get:
      tags: [Transformers]
      summary: List all transformers
      parameters:
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: network_voltage_kv, in: query, schema: {type: integer, enum: [11, 33]}}
        - {name: operational_status, in: query, schema: {type: string, enum: [Active, Faulty, 'Under Maintenance', Decommissioned]}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Transformers]
      summary: Create a new transformer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransformerCreate'
      responses:
        '201':
          $ref: '#/components/responses/ItemResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/search:
    get:
      tags: [Transformers]
      summary: Search transformers (alias for GET /transformers with filters)
      parameters:
        - {name: q, in: query, schema: {type: string}, description: Free-text search}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: network_voltage_kv, in: query, schema: {type: integer, enum: [11, 33]}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/stats:
    get:
      tags: [Transformers]
      summary: Get transformer statistics
      responses:
        '200':
          description: Transformer statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      by_status:
                        type: object
                      by_territory:
                        type: object

  /transformers/nearby:
    get:
      tags: [Transformers]
      summary: Find transformers near a GPS location
      parameters:
        - {name: lat, in: query, required: true, schema: {type: number}, description: Latitude}
        - {name: lng, in: query, required: true, schema: {type: number}, description: Longitude}
        - {name: radius, in: query, schema: {type: number, default: 5}, description: Search radius in km}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '400':
          description: Missing lat or lng
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/territory/{territoryId}:
    get:
      tags: [Transformers]
      summary: Get transformers by territory
      parameters:
        - {name: territoryId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: Transformers and stats for the territory
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/service-area/{serviceAreaId}:
    get:
      tags: [Transformers]
      summary: Get transformers by service area
      parameters:
        - {name: serviceAreaId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: Transformers and stats for the service area
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/bulk:
    post:
      tags: [Transformers]
      summary: Bulk create transformers (Super Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: array
                  items:
                    $ref: '#/components/schemas/TransformerCreate'
                - type: object
                  properties:
                    transformers:
                      type: array
                      items:
                        $ref: '#/components/schemas/TransformerCreate'
      responses:
        '207':
          description: Multi-status — check success/failed arrays
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      success:
                        type: array
                      failed:
                        type: array
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/{id}:
    get:
      tags: [Transformers]
      summary: Get transformer by ID
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Transformers]
      summary: Update transformer (Territory Manager or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransformerUpdate'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Transformers]
      summary: Soft-delete transformer (Super Admin only)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Transformer deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /transformers/{id}/verify:
    post:
      tags: [Transformers]
      summary: Verify transformer (Engineer or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /transformers/{id}/decommission:
    post:
      tags: [Transformers]
      summary: Decommission transformer
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  enum: ['End of Life', Damaged, Theft, Vandalism, Replaced, Other]
                notes:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /transformers/{id}/timeline:
    get:
      tags: [Transformers]
      summary: Get transformer event timeline
      parameters:
        - $ref: '#/components/parameters/Id'
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 50}}
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /transformers/{id}/qr:
    get:
      tags: [Transformers]
      summary: Get or generate QR code for transformer (idempotent)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: QR code data
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── INSPECTIONS ──────────────────────────────────────────────────────────────

  /inspections:
    get:
      tags: [Inspections]
      summary: List inspections
      parameters:
        - {name: transformer_id, in: query, schema: {type: string}}
        - {name: inspected_by, in: query, schema: {type: string}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Inspections]
      summary: Create inspection (Engineer or above)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionCreate'
      responses:
        '201':
          $ref: '#/components/responses/ItemResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /inspections/stats:
    get:
      tags: [Inspections]
      summary: Get inspection statistics
      responses:
        '200':
          description: Inspection stats

  /inspections/overdue:
    get:
      tags: [Inspections]
      summary: Get transformers with overdue inspections (Engineer or above)
      description: Returns Transformer documents (not Inspection records) that have not been inspected recently.
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /inspections/transformer/{transformerId}:
    get:
      tags: [Inspections]
      summary: Get inspections for a transformer
      parameters:
        - {name: transformerId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /inspections/latest/{transformerId}:
    get:
      tags: [Inspections]
      summary: Get latest inspection for a transformer
      parameters:
        - {name: transformerId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /inspections/{id}:
    get:
      tags: [Inspections]
      summary: Get inspection by ID
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Inspections]
      summary: Update inspection (Engineer or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionCreate'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
    delete:
      tags: [Inspections]
      summary: Delete inspection (Super Admin only)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Inspection deleted

  # ─── FAULTS ───────────────────────────────────────────────────────────────────

  /faults:
    get:
      tags: [Faults]
      summary: List faults
      parameters:
        - {name: fault_status, in: query, schema: {type: string, enum: [Reported, Acknowledged, 'In Progress', Resolved, Closed]}}
        - {name: severity, in: query, schema: {type: string, enum: [Minor, Major, Critical, 'Complete Outage']}}
        - {name: transformer_id, in: query, schema: {type: string}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Faults]
      summary: Report a new fault (Field Technician or above)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaultCreate'
      responses:
        '201':
          $ref: '#/components/responses/ItemResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /faults/stats:
    get:
      tags: [Faults]
      summary: Get fault statistics
      responses:
        '200':
          description: Fault stats

  /faults/open:
    get:
      tags: [Faults]
      summary: Get open (active) faults
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /faults/assigned-to-me:
    get:
      tags: [Faults]
      summary: Get faults assigned to the current user
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /faults/transformer/{transformerId}:
    get:
      tags: [Faults]
      summary: Get faults for a transformer
      parameters:
        - {name: transformerId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /faults/{id}:
    get:
      tags: [Faults]
      summary: Get fault by ID
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Faults]
      summary: Hard-delete fault (Super Admin only)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Fault deleted

  /faults/{id}/assign:
    put:
      tags: [Faults]
      summary: Assign fault to a team member (Engineer or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assigned_to]
              properties:
                assigned_to:
                  type: string
                  description: User ID
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /faults/{id}/resolve:
    put:
      tags: [Faults]
      summary: Mark fault as resolved (Field Technician or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution_description:
                  type: string
                downtime_hours:
                  type: number
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /faults/{id}/close:
    put:
      tags: [Faults]
      summary: Close fault after review — fault must be Resolved first (Territory Manager or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '400':
          description: Fault must be Resolved before closing

  /faults/{id}/escalate:
    put:
      tags: [Faults]
      summary: Escalate fault (Engineer or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                escalation_reason:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  # ─── MAINTENANCE ──────────────────────────────────────────────────────────────

  /maintenance:
    get:
      tags: [Maintenance]
      summary: List maintenance records
      parameters:
        - {name: transformer_id, in: query, schema: {type: string}}
        - {name: maintenance_type, in: query, schema: {type: string}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
    post:
      tags: [Maintenance]
      summary: Create maintenance record (Field Technician or above)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transformer_id, maintenance_type, maintenance_date]
              properties:
                transformer_id:
                  type: string
                maintenance_type:
                  type: string
                  enum: ['Routine Service', 'Oil Change', 'Bushing Replacement', 'Winding Repair', 'Complete Overhaul', 'Emergency Repair', 'Preventive', 'Other']
                maintenance_date:
                  type: string
                  format: date
                technician_name:
                  type: string
                cost:
                  type: number
                notes:
                  type: string
      responses:
        '201':
          $ref: '#/components/responses/ItemResponse'

  /maintenance/stats:
    get:
      tags: [Maintenance]
      summary: Get maintenance statistics
      responses:
        '200':
          description: Maintenance stats

  /maintenance/upcoming:
    get:
      tags: [Maintenance]
      summary: Get upcoming scheduled maintenance (Engineer or above)
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /maintenance/transformer/{transformerId}:
    get:
      tags: [Maintenance]
      summary: Get maintenance records for a transformer
      parameters:
        - {name: transformerId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'

  /maintenance/{id}:
    get:
      tags: [Maintenance]
      summary: Get maintenance record by ID
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Maintenance]
      summary: Update maintenance record (Engineer or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
    delete:
      tags: [Maintenance]
      summary: Delete maintenance record (Super Admin only)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
