openapi: 3.0.0
info:
  title: kVAssetTracker API
  version: 1.0.0
  description: Transformer Asset Management Platform — MVP API Contract

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://api.kVAssetTracker.com/api
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: Users
    description: Super Admin user management
  - name: Admin
    description: Super Admin read-only administration
  - name: Transformers
    description: Transformer asset management
  - name: Inspections
    description: Field inspections
  - name: Faults
    description: Fault reporting and lifecycle
  - name: Maintenance
    description: Maintenance records
  - name: Territories
    description: Territory reference data
  - name: ServiceAreas
    description: Service area reference data
  - name: Feeders
    description: Feeder reference data
  - name: Districts
    description: District reference data (read-only)
  - name: Ratings
    description: Transformer rating reference data
  - name: Reports
    description: JSON operational reports
  - name: Exports
    description: Direct CSV and JSON exports
  - name: Analytics
    description: Operational analytics and rule-based risk summaries
  - name: Audit
    description: Super Admin audit log read APIs

paths:

  # ─── AUTH ────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confirmPassword]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
                role:
                  type: string
                  enum: [Super Admin, Territory Manager, Engineer, Field Technician, Viewer]
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      message:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful — refreshToken set as HTTP-only cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Browser clients should send the HTTP-only `refreshToken` cookie set at login. Non-browser clients may send `refreshToken` in the JSON request body. If both are missing, the API returns 401.
      security: []
      parameters:
        - name: refreshToken
          in: cookie
          required: false
          schema:
            type: string
          description: HTTP-only refresh token cookie set by login.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Optional body token for non-browser API clients.
      responses:
        '200':
          description: New access token issued; refresh cookie is maintained or rotated as an HTTP-only cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout from all devices
      responses:
        '200':
          description: All sessions revoked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                preferences:
                  type: object
                push_tokens:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Profile updated
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returns success (email existence not revealed)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token from email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirmPassword]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email using token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verified

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend email verification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification email sent

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword, confirmPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions
      responses:
        '200':
          description: Active sessions

  /auth/sessions/{sessionToken}:
    delete:
      tags: [Auth]
      summary: Revoke a specific session
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session revoked

  # ─── USERS ───────────────────────────────────────────────────────────────────

  /users:
    get:
      tags: [Users]
      summary: List users
      description: Super Admin only. Returns sanitized user records with pagination.
      parameters:
        - {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
        - {name: search, in: query, schema: {type: string}}
        - {name: role, in: query, schema: {type: string, enum: [Super Admin, Territory Manager, Engineer, Field Technician, Viewer]}}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: is_active, in: query, schema: {type: boolean}}
      responses:
        '200':
          $ref: '#/components/responses/UserListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required
    post:
      tags: [Users]
      summary: Create user
      description: Super Admin only. Password is hashed by the User model and never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          $ref: '#/components/responses/UserResponseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: Super Admin only. Returns a sanitized user record.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/UserResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Update safe user fields
      description: Super Admin only. Does not update password, role, or activation status.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          $ref: '#/components/responses/UserResponseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/role:
    post:
      tags: [Users]
      summary: Change user role
      description: Super Admin only. Blocks self-demotion and last active Super Admin lockout.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleChange'
      responses:
        '200':
          $ref: '#/components/responses/UserResponseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /users/{id}/activate:
    post:
      tags: [Users]
      summary: Activate user
      description: Super Admin only.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  maxLength: 500
      responses:
        '200':
          $ref: '#/components/responses/UserResponseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /users/{id}/deactivate:
    post:
      tags: [Users]
      summary: Deactivate user
      description: Super Admin only. Blocks self-deactivation and last active Super Admin lockout.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDeactivate'
      responses:
        '200':
          $ref: '#/components/responses/UserResponseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  # ─── ADMIN ───────────────────────────────────────────────────────────────────

  /admin/system-stats:
    get:
      tags: [Admin]
      summary: Get read-only system statistics
      description: Super Admin only. Returns operational/admin summary counts; this endpoint performs no mutations.
      responses:
        '200':
          $ref: '#/components/responses/AdminStatsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /admin/users:
    get:
      tags: [Admin]
      summary: List users through the Admin route
      description: Super Admin only alias over the tested User Management list behavior. Returns sanitized users.
      parameters:
        - {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
        - {name: search, in: query, schema: {type: string}}
        - {name: role, in: query, schema: {type: string, enum: [Super Admin, Territory Manager, Engineer, Field Technician, Viewer]}}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: is_active, in: query, schema: {type: boolean}}
      responses:
        '200':
          $ref: '#/components/responses/UserListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /admin/audit-logs:
    get:
      tags: [Admin]
      summary: List audit logs through the Admin route
      description: Super Admin only alias over the tested Audit Log read behavior. Returns redacted audit records.
      parameters:
        - {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
        - {name: action, in: query, schema: {type: string}}
        - {name: action_category, in: query, schema: {type: string, enum: [AUTH, USER_MANAGEMENT, TRANSFORMER_MANAGEMENT, INSPECTION, FAULT_MANAGEMENT, MAINTENANCE, INSTALLATION, REPORTING, IMPORT, EXPORT, SYSTEM]}}
        - {name: user_id, in: query, schema: {type: string}}
        - {name: target_type, in: query, schema: {type: string, enum: [User, Transformer, Inspection, Fault, Maintenance, Installation, Report]}}
        - {name: target_id, in: query, schema: {type: string}}
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - {name: is_sensitive, in: query, schema: {type: boolean}}
      responses:
        '200':
          $ref: '#/components/responses/AuditListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /admin/backup:
    post:
      tags: [Admin]
      summary: Create a system backup
      description: Super Admin only. Requires maintenance mode to be enabled before creating a backup. Restore is not implemented by this endpoint.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupRequest'
      responses:
        '201':
          $ref: '#/components/responses/BackupResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required
        '409':
          description: Maintenance mode must be enabled first
        '500':
          $ref: '#/components/responses/BackupResponse'

  /admin/backups:
    get:
      tags: [Admin]
      summary: List backup history
      description: Super Admin only. Returns backup metadata only; download URLs are intentionally not exposed.
      parameters:
        - {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
        - {name: status, in: query, schema: {type: string, enum: [QUEUED, RUNNING, COMPLETED, FAILED]}}
      responses:
        '200':
          $ref: '#/components/responses/BackupListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /admin/restore/{backupId}:
    post:
      tags: [Admin]
      summary: Validate or restore from a backup
      description: Super Admin only. Requires maintenance mode, exact typed confirmation, verified artifact checksum, valid manifest, server-side collection allowlist, and active-operation lock. Dry run validates only and does not mutate data.
      parameters:
        - name: backupId
          in: path
          required: true
          schema:
            type: string
          description: Server-generated backup ID, for example BKP-...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreRequest'
      responses:
        '200':
          $ref: '#/components/responses/RestoreResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required
        '404':
          description: Backup or artifact not found
        '409':
          description: Maintenance mode disabled or another operation is running

  /admin/maintenance:
    get:
      tags: [Admin]
      summary: Get maintenance mode status
      description: Super Admin only. Returns the durable maintenance mode state.
      responses:
        '200':
          $ref: '#/components/responses/MaintenanceModeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required
    post:
      tags: [Admin]
      summary: Enable or disable maintenance mode
      description: Super Admin only. Persists maintenance state and blocks non-admin unsafe writes while enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceModeUpdate'
      responses:
        '200':
          $ref: '#/components/responses/MaintenanceModeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  # ─── TRANSFORMERS ─────────────────────────────────────────────────────────────

  /transformers:
    get:
      tags: [Transformers]
      summary: List all transformers
      parameters:
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: network_voltage_kv, in: query, schema: {type: integer, enum: [11, 33]}}
        - {name: operational_status, in: query, schema: {type: string, enum: [Active, Faulty, 'Under Maintenance', Decommissioned]}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Transformers]
      summary: Create a new transformer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransformerCreate'
      responses:
        '201':
          $ref: '#/components/responses/ItemResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/search:
    get:
      tags: [Transformers]
      summary: Search transformers (alias for GET /transformers with filters)
      parameters:
        - {name: q, in: query, schema: {type: string}, description: Free-text search}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: network_voltage_kv, in: query, schema: {type: integer, enum: [11, 33]}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/stats:
    get:
      tags: [Transformers]
      summary: Get transformer statistics
      responses:
        '200':
          description: Transformer statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      by_status:
                        type: object
                      by_territory:
                        type: object

  /transformers/nearby:
    get:
      tags: [Transformers]
      summary: Find transformers near a GPS location
      parameters:
        - {name: lat, in: query, required: true, schema: {type: number}, description: Latitude}
        - {name: lng, in: query, required: true, schema: {type: number}, description: Longitude}
        - {name: radius, in: query, schema: {type: number, default: 5}, description: Search radius in km}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '400':
          description: Missing lat or lng
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/territory/{territoryId}:
    get:
      tags: [Transformers]
      summary: Get transformers by territory
      parameters:
        - {name: territoryId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: Transformers and stats for the territory
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/service-area/{serviceAreaId}:
    get:
      tags: [Transformers]
      summary: Get transformers by service area
      parameters:
        - {name: serviceAreaId, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: Transformers and stats for the service area
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/bulk:
    post:
      tags: [Transformers]
      summary: Bulk create transformers (Super Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: array
                  items:
                    $ref: '#/components/schemas/TransformerCreate'
                - type: object
                  properties:
                    transformers:
                      type: array
                      items:
                        $ref: '#/components/schemas/TransformerCreate'
      responses:
        '207':
          description: Multi-status — check success/failed arrays
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      success:
                        type: array
                      failed:
                        type: array
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transformers/{id}:
    get:
      tags: [Transformers]
      summary: Get transformer by ID
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Transformers]
      summary: Update transformer (Territory Manager or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransformerUpdate'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Transformers]
      summary: Soft-delete transformer (Super Admin only)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Transformer deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /transformers/{id}/verify:
    post:
      tags: [Transformers]
      summary: Verify transformer (Engineer or above)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /transformers/{id}/decommission:
    post:
      tags: [Transformers]
      summary: Decommission transformer
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
