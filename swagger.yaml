          required: true
          schema:
            type: string
        - {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
        - {name: action, in: query, schema: {type: string}}
        - {name: action_category, in: query, schema: {type: string, enum: [AUTH, USER_MANAGEMENT, TRANSFORMER_MANAGEMENT, INSPECTION, FAULT_MANAGEMENT, MAINTENANCE, INSTALLATION, REPORTING, IMPORT, EXPORT, SYSTEM]}}
        - {name: target_type, in: query, schema: {type: string, enum: [User, Transformer, Inspection, Fault, Maintenance, Installation, Report]}}
        - {name: target_id, in: query, schema: {type: string}}
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - {name: is_sensitive, in: query, schema: {type: boolean}}
      responses:
        '200':
          $ref: '#/components/responses/AuditListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /audit/transformers/{transformerId}:
    get:
      tags: [Audit]
      summary: List audit logs for a transformer
      description: Super Admin only. This is the actual mounted transformer audit route.
      parameters:
        - name: transformerId
          in: path
          required: true
          schema:
            type: string
        - {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
        - {name: action, in: query, schema: {type: string}}
        - {name: action_category, in: query, schema: {type: string, enum: [AUTH, USER_MANAGEMENT, TRANSFORMER_MANAGEMENT, INSPECTION, FAULT_MANAGEMENT, MAINTENANCE, INSTALLATION, REPORTING, IMPORT, EXPORT, SYSTEM]}}
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - {name: is_sensitive, in: query, schema: {type: boolean}}
      responses:
        '200':
          $ref: '#/components/responses/AuditListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  /audit/actions:
    get:
      tags: [Audit]
      summary: List audit categories and actions
      description: Super Admin only. Returns known audit categories/actions plus values already present in stored logs.
      responses:
        '200':
          $ref: '#/components/responses/AuditActionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Super Admin role required

  # ─── REPORTS ──────────────────────────────────────────────────────────────────

  /reports/transformers:
    get:
      tags: [Reports]
      summary: Generate transformer report
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: feeder_id, in: query, schema: {type: string}}
        - {name: district_id, in: query, schema: {type: string}}
        - {name: network_voltage_kv, in: query, schema: {type: number, enum: [11, 33]}}
        - {name: kva_rating, in: query, schema: {type: number, enum: [50, 100, 160, 200, 250, 315, 500, 630, 1000]}}
        - {name: operational_status, in: query, schema: {type: string, enum: [Active, Inactive, Decommissioned, 'Under Maintenance', Faulty]}}
        - {name: format, in: query, schema: {type: string, enum: [json], default: json}}
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /reports/inspections:
    get:
      tags: [Reports]
      summary: Generate inspection report
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: feeder_id, in: query, schema: {type: string}}
        - {name: district_id, in: query, schema: {type: string}}
        - {name: transformer_id, in: query, schema: {type: string}}
        - {name: condition, in: query, schema: {type: string, enum: [Good, Fair, Poor, Critical]}}
        - {name: format, in: query, schema: {type: string, enum: [json], default: json}}
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /reports/faults:
    get:
      tags: [Reports]
      summary: Generate fault report
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: feeder_id, in: query, schema: {type: string}}
        - {name: district_id, in: query, schema: {type: string}}
        - {name: fault_status, in: query, schema: {type: string, enum: [Open, Assigned, 'In Progress', Resolved, Closed]}}
        - {name: severity, in: query, schema: {type: string, enum: [Minor, Major, Critical, 'Complete Outage']}}
        - {name: fault_type, in: query, schema: {type: string, enum: [Overload, 'Oil Leak', 'Bushing Failure', 'Winding Failure', 'Complete Failure', Fire, Theft, Vandalism, 'LV Side Fault', 'HV Side Fault', Other]}}
        - {name: format, in: query, schema: {type: string, enum: [json], default: json}}
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /reports/maintenance:
    get:
      tags: [Reports]
      summary: Generate maintenance report
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: feeder_id, in: query, schema: {type: string}}
        - {name: district_id, in: query, schema: {type: string}}
        - {name: maintenance_type, in: query, schema: {type: string, enum: [Preventive, Corrective, Emergency]}}
        - {name: format, in: query, schema: {type: string, enum: [json], default: json}}
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /reports/asset-register:
    get:
      tags: [Reports]
      summary: Generate asset register report
      parameters:
        - {name: startDate, in: query, schema: {type: string, format: date}}
        - {name: endDate, in: query, schema: {type: string, format: date}}
        - {name: territory_id, in: query, schema: {type: string}}
        - {name: service_area_id, in: query, schema: {type: string}}
        - {name: feeder_id, in: query, schema: {type: string}}
        - {name: district_id, in: query, schema: {type: string}}
        - {name: network_voltage_kv, in: query, schema: {type: number, enum: [11, 33]}}
        - {name: kva_rating, in: query, schema: {type: number, enum: [50, 100, 160, 200, 250, 315, 500, 630, 1000]}}
        - {name: operational_status, in: query, schema: {type: string, enum: [Active, Inactive, Decommissioned, 'Under Maintenance', Faulty]}}
        - {name: format, in: query, schema: {type: string, enum: [json], default: json}}
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  # ─── EXPORTS ──────────────────────────────────────────────────────────────────

  /exports/csv:
    post:
      tags: [Exports]
      summary: Generate a CSV export
      description: Direct CSV response for tested report export types. Raw GPS coordinates are excluded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: CSV export generated
          content:
            text/csv:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /exports/json:
    post:
      tags: [Exports]
      summary: Generate a JSON export
      description: JSON export envelope for tested report export types. Raw GPS coordinates are excluded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          $ref: '#/components/responses/ExportJsonResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: MongoDB ObjectId

  schemas:
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            accessToken:
              type: string

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [Super Admin, Territory Manager, Engineer, Field Technician, Viewer]
        territory_id:
          type: string
        is_active:
          type: boolean
        is_email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    UserCreate:
      type: object
      required: [name, email, password, confirmPassword, role]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Must include uppercase, lowercase, number, and special character.
        confirmPassword:
          type: string
          minLength: 8
        role:
          type: string
          enum: [Super Admin, Territory Manager, Engineer, Field Technician, Viewer]
        territory_id:
          type: string
          description: Required for Territory Manager, Engineer, and Field Technician.
        service_area_id:
          type: string
          description: Required for Engineer and Field Technician.
        is_active:
          type: boolean
          default: true

    UserUpdate:
      type: object
      description: Safe profile/admin-managed fields only. Password, role, and activation status are ignored by this endpoint.
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        territory_id:
          type: string
        service_area_id:
          type: string
        preferences:
          type: object
          properties:
            theme:
              type: string
              enum: [light, dark, system]
            notifications:
              type: object
              properties:
                email:
                  type: boolean
                push:
                  type: boolean
                sms:
                  type: boolean
            dashboard_widgets:
              type: array
              items:
                type: string

    UserRoleChange:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [Super Admin, Territory Manager, Engineer, Field Technician, Viewer]
        territory_id:
          type: string
          description: Required for Territory Manager, Engineer, and Field Technician.
        service_area_id:
          type: string
          description: Required for Engineer and Field Technician.

    UserDeactivate:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          maxLength: 500

    AdminStats:
      type: object
      properties:
        users:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            by_role:
              type: object
        transformers:
          type: object
          properties:
            total:
              type: integer
            by_status:
              type: object
        faults:
          type: object
          properties:
            open:
              type: integer
        inspections:
          type: object
          properties:
            overdue:
              type: integer
        maintenance:
          type: object
          properties:
            upcoming:
              type: integer
        audit:
          type: object
          properties:
            recent_activity_count:
              type: integer
        generated_at:
          type: string
          format: date-time

    MaintenanceMode:
      type: object
      properties:
        enabled:
          type: boolean
        message:
          type: string
        reason:
          type: string
          nullable: true
        enabled_by:
          type: string
          nullable: true
        enabled_at:
          type: string
          format: date-time
          nullable: true
        disabled_by:
          type: string
          nullable: true
        disabled_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    MaintenanceModeUpdate:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        message:
          type: string
          maxLength: 500
          example: System is under maintenance
        reason:
          type: string
          maxLength: 500
          example: Planned maintenance

    BackupRequest:
      type: object
      properties:
        backup_name:
          type: string
          minLength: 3
          maxLength: 80
          pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$'
          example: nightly_backup
        retention_until:
          type: string
          format: date-time
          description: Must be a future date.
        collections:
          type: array
          items:
            type: string
          description: Optional collection allowlist. If omitted, all non-system collections are included.
        metadata:
          type: object

    BackupJob:
      type: object
      properties:
        _id:
          type: string
        backup_id:
          type: string
        filename:
          type: string
        storage_key:
          type: string
          description: Internal storage key. No download URL is returned.
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_by:
          oneOf:
            - type: string
            - type: object
        checksum:
          type: string
        compression:
          type: string
          enum: [none, gzip]
        encryption:
          type: boolean
        size_bytes:
          type: integer
        collections:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              document_count:
                type: integer
        schema_version:
          type: string
        app_version:
          type: string
        retention_until:
          type: string
          format: date-time
        metadata:
          type: object
        manifest:
          type: object
        error_message:
          type: string

    RestoreRequest:
      type: object
      required: [confirmation]
      properties:
        confirmation:
          type: string
          description: Must exactly match RESTORE BACKUP <backupId>.
          example: RESTORE BACKUP BKP-20260706093048522-DSP9FS
        dryRun:
          type: boolean
          default: true
          description: When true, validates artifact and restore plan without mutating data.
        collections:
          type: array
          items:
            type: string
            enum: [transformers, inspections, faults, maintenances]
          description: Optional restore collection subset. Values are restricted by the server allowlist and backup contents.

    RestoreResult:
      type: object
      properties:
        dryRun:
          type: boolean
        backup_id:
          type: string
        verified:
          type: boolean
          description: Present on dry-run responses.
        collections:
          type: array
          items:
            type: string
        plan:
          type: object
          properties:
            collections:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  document_count:
                    type: integer
            total_documents:
              type: integer
        warnings:
          type: array
          items:
            type: string
        pre_restore_backup_id:
          type: string
          description: Present on destructive restore responses.
        restored_collections:
          type: array
          items:
            type: string
        restored_counts:
          type: object
        completed_at:
          type: string
          format: date-time

    TransformerCreate:
      type: object
      required: [manufacturer, kva_rating, network_voltage_kv, territory_id, district_id, site_name, latitude, longitude]
      properties:
        manufacturer:
          type: string
        serial_number:
          type: string
        kva_rating:
          type: integer
          enum: [50, 100, 160, 200, 250, 315, 500, 630, 1000]
        network_voltage_kv:
          type: integer
          enum: [11, 33]
        voltage_secondary:
          type: string
          enum: ['415V', '240V', Other]
        phase_type:
          type: string
          enum: ['Single Phase', 'Three Phase']
        cooling_type:
          type: string
          enum: [ONAN, ONAF, OFAF]
        mounting_type:
          type: string
          enum: ['Pole Mounted', Plinth, Ground, 'Indoor Substation']
        territory_id:
          type: string
        service_area_id:
          type: string
        feeder_name:
          type: string
        district_id:
          type: string
        site_name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        install_date:
          type: string
          format: date
        installing_contractor:
          type: string

    TransformerUpdate:
      type: object
      properties:
        manufacturer:
          type: string
        operational_status:
          type: string
          enum: [Active, Faulty, 'Under Maintenance', Decommissioned]
        site_name:
          type: string
        service_area_id:
          type: string
        feeder_name:
          type: string

    InspectionCreate:
      type: object
      required: [transformer_id]
      properties:
        transformer_id:
          type: string
        inspection_date:
          type: string
          format: date
        overall_condition:
          type: string
          enum: [Good, Fair, Poor, Critical]
        physical:
          type: object
        electrical:
          type: object
        oil:
          type: object
        recommendations:
          type: string

    FaultCreate:
      type: object
      required: [transformer_id, fault_type, severity, fault_description]
      properties:
        transformer_id:
          type: string
        fault_date:
          type: string
          format: date
        fault_type:
          type: string
          enum: [Overload, 'Oil Leak', 'Bushing Failure', 'Winding Failure', 'Complete Failure', Fire, Theft, Vandalism, 'LV Side Fault', 'HV Side Fault', Other]
        severity:
          type: string
          enum: [Minor, Major, Critical, 'Complete Outage']
        fault_description:
          type: string
          minLength: 10
        fault_source:
          type: string
          enum: ['Field Observation', 'Customer Report', Supervisor]
        customers_affected:
          type: integer
          minimum: 0

    ReportEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        summary:
          type: object
          properties:
            title:
              type: string
            total:
              type: integer
        filters:
          type: object
        generated_at:
          type: string
          format: date-time

    ExportRequest:
      type: object
      required: [report_type]
      properties:
        report_type:
          type: string
          enum: [transformers, inspections, faults, maintenance, asset-register]
        filters:
          type: object
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
            territory_id:
              type: string
            service_area_id:
              type: string
            feeder_id:
              type: string
            district_id:
              type: string
            network_voltage_kv:
              type: number
              enum: [11, 33]
            kva_rating:
              type: number
              enum: [50, 100, 160, 200, 250, 315, 500, 630, 1000]
            operational_status:
              type: string
              enum: [Active, Inactive, Decommissioned, 'Under Maintenance', Faulty]
            transformer_id:
              type: string
            condition:
              type: string
              enum: [Good, Fair, Poor, Critical]
            fault_status:
              type: string
              enum: [Open, Assigned, 'In Progress', Resolved, Closed]
            severity:
              type: string
              enum: [Minor, Major, Critical, 'Complete Outage']
            fault_type:
              type: string
              enum: [Overload, 'Oil Leak', 'Bushing Failure', 'Winding Failure', 'Complete Failure', Fire, Theft, Vandalism, 'LV Side Fault', 'HV Side Fault', Other]
            maintenance_type:
              type: string
              enum: [Preventive, Corrective, Emergency]

    ExportJsonEnvelope:
      type: object
      properties:
        metadata:
          type: object
          properties:
            report_type:
              type: string
            format:
              type: string
              enum: [json]
            total:
              type: integer
            filters:
              type: object
            generated_at:
              type: string
              format: date-time
        rows:
          type: array
          items:
            type: object

    AnalyticsEnvelope:
      type: object
      properties:
        summary:
          type: object
        breakdowns:
          type: object
        trends:
          type: array
          items:
            type: object
        risks:
          type: array
          items:
            type: object
        filters:
          type: object
        generated_at:
          type: string
          format: date-time

    AuditLogEntry:
      type: object
      properties:
        _id:
          type: string
        user_id:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
            email:
              type: string
            role:
              type: string
        action:
          type: string
        action_category:
          type: string
        target_user_id:
          type: object
        target_transformer_id:
          type: object
        target_record_type:
          type: string
        target_record_id:
          type: string
        details:
          type: string
        request_method:
          type: string
        request_path:
          type: string
        old_values:
          type: object
          description: Sensitive password/token/secret values are redacted.
        new_values:
          type: object
          description: Sensitive password/token/secret values are redacted.
        metadata:
          type: object
          description: Sensitive password/token/secret values are redacted.
        is_sensitive:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AuditActionsEnvelope:
      type: object
      properties:
        categories:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string

  responses:
    PaginatedResponse:
      description: Paginated list
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
              data:
                type: array
                items:
                  type: object
              pagination:
                type: object
                properties:
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
                  pages:
                    type: integer

    ItemResponse:
      description: Single item or list without pagination
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
              data:
                type: object

    UserListResponse:
      description: Users retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              data:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              pagination:
                type: object
                properties:
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
                  pages:
                    type: integer

    UserResponseEnvelope:
      description: User operation completed successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
